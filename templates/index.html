<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <!-- Tailwind CSS (For clean and responsive styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-2xl bg-white p-6 md:p-10 rounded-xl card">
        <h1 class="text-3xl font-bold text-center text-red-600 mb-6">Heart Disease Prediction</h1>
        <p class="text-center text-gray-600 mb-8">Please enter all 13 required health parameters:</p>

        <!-- Prediction Form -->
        <form id="predictionForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- 1. Age (CONT_COLS) -->
                <div>
                    <label for="age" class="block text-sm font-medium text-gray-700">Age:</label>
                    <input type="number" id="age" name="age" required min="1" max="120"
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500" placeholder="e.g., 52">
                </div>

                <!-- 2. Sex (ORDINAL_COLS) -->
                <div>
                    <label for="sex" class="block text-sm font-medium text-gray-700">Sex:</label>
                    <select id="sex" name="sex" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="1">Male (1)</option>
                        <option value="0">Female (0)</option>
                    </select>
                </div>

                <!-- 3. Chest Pain Type (cp) (ONE_COLS) -->
                <div>
                    <label for="cp" class="block text-sm font-medium text-gray-700">Chest Pain Type (cp):</label>
                    <select id="cp" name="cp" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="0">0: Typical Angina</option>
                        <option value="1">1: Atypical Angina</option>
                        <option value="2">2: Non-Anginal Pain</option>
                        <option value="3">3: Asymptomatic</option>
                    </select>
                </div>

                <!-- 4. Resting Blood Pressure (trestbps) (CONT_COLS) -->
                <div>
                    <label for="trestbps" class="block text-sm font-medium text-gray-700">Resting Blood Pressure (trestbps):</label>
                    <input type="number" id="trestbps" name="trestbps" required min="80" max="200" placeholder="In mmHg (e.g., 120)"
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                </div>

                <!-- 5. Serum Cholestoral (chol) (CONT_COLS) -->
                <div>
                    <label for="chol" class="block text-sm font-medium text-gray-700">Serum Cholestoral (chol):</label>
                    <input type="number" id="chol" name="chol" required min="100" max="600" placeholder="In mg/dl (e.g., 240)"
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                </div>

                <!-- 6. Maximum Heart Rate (thalach) (CONT_COLS) -->
                <div>
                    <label for="thalach" class="block text-sm font-medium text-gray-700">Maximum Heart Rate Achieved (thalach):</label>
                    <input type="number" id="thalach" name="thalach" required min="70" max="220" placeholder="e.g., 160"
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                </div>
                
                <!-- 7. Fasting Blood Sugar > 120 (fbs) (ORDINAL_COLS) -->
                <div>
                    <label for="fbs" class="block text-sm font-medium text-gray-700">Fasting Blood Sugar > 120 mg/dl (fbs):</label>
                    <select id="fbs" name="fbs" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="1">Yes (True) - 1</option>
                        <option value="0">No (False) - 0</option>
                    </select>
                </div>

                <!-- 8. Resting Electrocardiographic Results (restecg) (ONE_COLS) -->
                <div>
                    <label for="restecg" class="block text-sm font-medium text-gray-700">Resting ECG Results (restecg):</label>
                    <select id="restecg" name="restecg" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="0">0: Normal</option>
                        <option value="1">1: ST-T Wave Abnormality</option>
                        <option value="2">2: Probable/Definite LVH</option>
                    </select>
                </div>

                <!-- 9. Exercise Induced Angina (exang) (ORDINAL_COLS) -->
                <div>
                    <label for="exang" class="block text-sm font-medium text-gray-700">Exercise Induced Angina (exang):</label>
                    <select id="exang" name="exang" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="1">Yes - 1</option>
                        <option value="0">No - 0</option>
                    </select>
                </div>
                
                <!-- 10. ST depression (oldpeak) (CONT_COLS) -->
                <div>
                    <label for="oldpeak" class="block text-sm font-medium text-gray-700">ST Depression (oldpeak):</label>
                    <input type="number" step="0.1" id="oldpeak" name="oldpeak" required min="0.0" max="6.2" placeholder="e.g., 1.0"
                           class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                </div>

                <!-- 11. The slope of the peak exercise ST segment (slope) (ONE_COLS) -->
                <div>
                    <label for="slope" class="block text-sm font-medium text-gray-700">Peak Exercise ST Segment Slope (slope):</label>
                    <select id="slope" name="slope" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="0">0: Upsloping</option>
                        <option value="1">1: Flat</option>
                        <option value="2">2: Downsloping</option>
                    </select>
                </div>

                <!-- 12. Number of major vessels (ca) (ONE_COLS) -->
                <div>
                    <label for="ca" class="block text-sm font-medium text-gray-700">Number of Major Vessels (ca, 0-3):</label>
                    <select id="ca" name="ca" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

                <!-- 13. Thalassemia (thal) (ONE_COLS) -->
                <div>
                    <label for="thal" class="block text-sm font-medium text-gray-700">Thalassemia (thal):</label>
                    <select id="thal" name="thal" required
                            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500">
                        <option value="0">0: Normal</option>
                        <option value="1">1: Fixed Defect</option>
                        <option value="2">2: Reversible Defect</option>
                        <option value="3">3: Normal</option>
                    </select>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submitButton"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-md text-sm font-medium text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition duration-150 ease-in-out mt-6">
                Predict Heart Disease
            </button>
        </form>

        <!-- Loading and Result Area -->
        <div id="loadingMessage" class="mt-6 text-center text-lg text-red-500 hidden">
            <div class="animate-spin inline-block w-6 h-6 border-[3px] border-current border-t-transparent text-red-500 rounded-full" role="status"></div>
            <p class="mt-2">Processing prediction...</p>
        </div>
        
        <div id="resultBox" class="mt-8 p-4 border border-gray-200 rounded-lg hidden">
            <h3 class="text-xl font-semibold mb-2 text-gray-800">Prediction Result:</h3>
            <p id="predictionOutput" class="text-2xl font-bold"></p>
            <p id="messageOutput" class="text-sm text-gray-500 mt-2"></p>
        </div>

        <div id="errorMessage" class="mt-8 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg hidden">
            <p class="font-bold">Error:</p>
            <p id="errorDetails"></p>
        </div>
        
    </div>

    <!-- JavaScript for API Interaction -->
    <script>
        const form = document.getElementById('predictionForm');
        const submitButton = document.getElementById('submitButton');
        const loadingMessage = document.getElementById('loadingMessage');
        const resultBox = document.getElementById('resultBox');
        const predictionOutput = document.getElementById('predictionOutput');
        const messageOutput = document.getElementById('messageOutput');
        const errorMessage = document.getElementById('errorMessage');
        const errorDetails = document.getElementById('errorDetails');
        
        // --- API Configuration ---
        const API_URL = '/api/predict'; // Flask Backend Endpoint
        const MAX_RETRIES = 3;
        const INITIAL_DELAY = 1000; 

        // Fetch function with Exponential Backoff
        async function fetchWithRetry(url, options, retries = 0) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    throw new Error(`HTTP Error! Status: ${response.status}`);
                }
                return response.json();
            } catch (error) {
                if (retries < MAX_RETRIES) {
                    const delay = INITIAL_DELAY * (2 ** retries);
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchWithRetry(url, options, retries + 1);
                }
                throw error;
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Reset previous outputs and start loading
            resultBox.classList.add('hidden');
            errorMessage.classList.add('hidden');
            loadingMessage.classList.remove('hidden');
            submitButton.disabled = true;

            try {
                // Convert form data to JSON payload
                const formData = new FormData(form);
                const payload = {};
                for (const [key, value] of formData.entries()) {
                    // Ensure all values are sent as Numbers
                    payload[key] = parseFloat(value);
                }
                
                // Construct fetch options
                const options = {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                };

                const responseData = await fetchWithRetry(API_URL, options);

                loadingMessage.classList.add('hidden');
                
                if (responseData.status === 'success') {
                    resultBox.classList.remove('hidden');
                    const predictionValue = responseData.prediction; // 0 or 1
                    const probability = responseData.probability_disease;
                    
                    let resultText = '';
                    let colorClass = '';
                    
                    // Interpret the result
                    if (predictionValue === 1) { 
                        resultText = 'High Risk! (Heart Disease Detected)';
                        colorClass = 'text-red-600';
                    } else {
                        resultText = 'Low Risk (No Heart Disease Detected)';
                        colorClass = 'text-green-600';
                    }

                    predictionOutput.textContent = resultText;
                    predictionOutput.className = 'text-2xl font-bold ' + colorClass;
                    
                    messageOutput.innerHTML = `Model Used: ${responseData.model_used}<br>Probability of Disease: **${(probability * 100).toFixed(2)}%**`;
                    errorMessage.classList.add('hidden');
                    
                } else {
                    // Handle application-level errors from the backend (e.g., missing features)
                    errorMessage.classList.remove('hidden');
                    errorDetails.textContent = responseData.error || 'Unknown server error.';
                    resultBox.classList.add('hidden');
                }

            } catch (error) {
                loadingMessage.classList.add('hidden');
                errorMessage.classList.remove('hidden');
                errorDetails.textContent = `Connection Error: Could not connect to the backend. (${error.message})`;
                console.error("Fetch Error:", error);

            } finally {
                submitButton.disabled = false;
            }
        });
    </script>
</body>
</html>
